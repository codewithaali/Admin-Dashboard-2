<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>class 17</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" integrity="sha512-1ycn6IcaQQ40/MKBW2W4Rhis/DbILU74C1vSrLJxCq57o941Ym01SwNsOMqvEBFlcgUa6xLiPY/NS5R+E6ztJQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
    <style>
        .login{
            position: relative;
            margin: auto;
            background-color: white;
            top: 140px;
            width: 400px;
            height: 350px;
            display: block;
            text-align: center
        }
        .login{
            border-radius: 15px;
            box-shadow: 10px 10px 30px rgb(92, 91, 91);
        }
        .login h1{
            display: block;
            text-align: center;
            padding-top: 30px;
            font-size: 40px;
            color: gray;
        }
        .login .form-group{
            width: 300px;
            margin-top: 20px;
            display: block;
            text-align: center;
            margin-left: 50px;
        }
        .form-group input{
            width: 300px;
            padding: 10px 40px;
            font-size: 20px;
            border-radius: 10px;
            border: 1px solid rgb(180, 178, 178);
            background-color: rgb(249, 248, 248);
        }
        .form-group .prefix1{
            position: absolute;
            left: 60px;
            top: 105px;
            
        }
        .form-group .prefix2{
            position: absolute;
            left: 60px;
            top: 170px;
            
        }
        .form-group .prefix3{
            position: absolute;
            left: 60px;
            top: 235px;
            
        }
        .form-group .sufix{
            position: absolute;
            right: 70px;
            top: 235px;
        }
        .form-group button{
            font-size: 25px;
            padding: 3px 40px;
        }
        .form-group button:hover{
            color: gray;
            box-shadow: 10px 10px 30px rgb(239, 238, 238);
        }
        .form-group input:hover{
            box-shadow: 10px 10px 8px rgb(239, 238, 238);
        }
        
    </style>
</head>
<body>
    <div class="login">
        <h1>Login</h1>
        <form action="./home.html" method="get">
            <div class="form-group">
        <span class="prefix1">👤</span>
        <input type="text" placeholder="Enter User Name"required />
      </div>
      <div class="form-group">
        <span class="prefix2">📧</span>
        <input type="email" placeholder="Enter Email"required />
      </div>
      <div class="form-group">
        <span class="prefix3">🔒</span>
        <span class="sufix">👁</span>
        <input type="text" placeholder="Enter Password"required />
      </div>
      <div class="form-group"><button>Login</button></div>
        </form>
    </div>
</body>
</html>
